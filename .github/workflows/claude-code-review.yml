name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    branches: [main]

jobs:
  claude-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Collect previous review findings
        id: prev-review
        if: github.event.action == 'synchronize'
        run: |
          PR=${{ github.event.pull_request.number }}
          REPO=${{ github.repository }}

          # Collect existing inline review comments from claude[bot]
          # DO NOT delete them — preserve review history
          INLINE_JSON=$(gh api "repos/$REPO/pulls/$PR/comments" \
            --jq '[.[] | select(.user.login == "claude[bot]") | {path, line, body: (.body | split("\n")[0] | .[0:200])}]' \
            2>/dev/null || echo "[]")
          INLINE_COUNT=$(echo "$INLINE_JSON" | jq 'length')

          if [ "$INLINE_COUNT" -gt 0 ]; then
            FINDINGS=""
            for i in $(seq 0 $((INLINE_COUNT - 1))); do
              FILE=$(echo "$INLINE_JSON" | jq -r ".[$i].path")
              LINE=$(echo "$INLINE_JSON" | jq -r ".[$i].line // \"N/A\"")
              BODY=$(echo "$INLINE_JSON" | jq -r ".[$i].body" | head -1 | cut -c1-150)
              N=$((i + 1))
              FINDINGS+="$N. $FILE:L$LINE — $BODY"$'\n'
            done

            {
              echo "context<<CONTEXT_EOF"
              echo ""
              echo "PREVIOUS REVIEW FINDINGS ($INLINE_COUNT issue(s) from prior round):"
              echo "$FINDINGS"
              echo "For each previous finding above, verify whether it was addressed in the new commits."
              echo "Report status: [RESOLVED] if fixed, [STILL OPEN] if not, [PARTIALLY FIXED] if partially addressed."
              echo "CONTEXT_EOF"
            } >> "$GITHUB_OUTPUT"
          fi

          # Clear old summary comment only (not inline comments)
          # This prevents summary comments from stacking up
          gh api "repos/$REPO/issues/$PR/comments" \
            --jq '.[] | select(.body | test("### Code Review")) | select(.user.login | test("github-actions|claude")) | .id' 2>/dev/null \
          | while read comment_id; do
              gh api "repos/$REPO/issues/comments/$comment_id" -X DELETE 2>/dev/null || true
            done
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Verify API connectivity
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
        run: |
          set +e
          curl -s --connect-timeout 10 --max-time 15 \
            -X POST "${ANTHROPIC_BASE_URL}/v1/messages" \
            -H "x-api-key: ${ANTHROPIC_AUTH_TOKEN}" \
            -H "anthropic-version: 2023-06-01" \
            -H "content-type: application/json" \
            -d '{"model":"claude-sonnet-4-6","max_tokens":10,"messages":[{"role":"user","content":"hi"}}' \
            -o /dev/null -w "HTTP %{http_code}" && echo " OK" || echo "::warning::API connectivity check failed, proceeding anyway"

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          prompt: |
            You are a senior code reviewer. Perform a thorough review of PR #${{ github.event.pull_request.number }} in ${{ github.repository }}.

            ${{ steps.prev-review.outputs.context }}

            ## Review Pipeline

            ### Step 1: Gather Context
            Run these commands:
            - `gh pr diff ${{ github.event.pull_request.number }}` to get the full diff
            - `gh pr view ${{ github.event.pull_request.number }} --json title,body,files` for PR metadata
            - Find all CLAUDE.md files relevant to modified directories

            ### Step 2: Parallel Review (5 agents)
            Use the Agent tool to launch 5 parallel review agents. Each agent should read the full diff and review through its specific lens:

            **Agent 1 — CLAUDE.md Compliance**: Check if changes violate rules in any CLAUDE.md files. Only flag issues the CLAUDE.md explicitly calls out. Not all CLAUDE.md instructions apply during review (some are authoring-time guidance).

            **Agent 2 — Bug Detection (Shallow)**: Read file changes only (no extra context). Look for large, obvious bugs: logic errors, off-by-one, null/undefined handling, race conditions, incorrect API usage. Avoid nitpicks. Ignore likely false positives. Focus ONLY on code introduced in this PR.

            **Agent 3 — Historical Context**: Use `git blame` and `git log` on modified files. Identify bugs that become apparent only with historical context (e.g., a fix being inadvertently reverted, or assumptions contradicted by history).

            **Agent 4 — Security & Performance**: Check for injection vulnerabilities (SQL, command, XSS), hardcoded credentials, missing input validation at system boundaries, O(n^2) in hot paths, missing pagination, large allocations in loops.

            **Agent 5 — Code Quality & Patterns**: Check for dead code, overly complex functions (>50 lines or >5 params), missing error handling at system boundaries, naming inconsistencies with the codebase.

            Each agent returns: file path, line range, issue description, and category (bug/security/performance/CLAUDE.md/quality).

            ### Step 3: Confidence Scoring
            For each finding, score confidence 0-100:
            - 0: False positive, pre-existing issue, or caught by linter/compiler
            - 25: Might be real, might be false positive. Stylistic nitpick not in CLAUDE.md
            - 50: Real but minor, rarely hit in practice
            - 75: High confidence, directly impacts functionality or explicitly in CLAUDE.md
            - 100: Certain, double-checked, frequent impact

            **Discard ALL findings below 80.**

            False positive definitions (do NOT flag these):
            - Pre-existing issues not introduced by this PR
            - Issues a linter/typechecker/compiler would catch
            - Pedantic nitpicks a senior engineer would skip
            - Changes in functionality that are likely intentional
            - Real issues on lines the PR did NOT modify

            ### Step 4: Post Results
            Use `gh pr comment ${{ github.event.pull_request.number }}` to post results.

            Format:
            ```
            ### Code Review

            Found N issue(s):

            1. **description** (category)
               https://github.com/${{ github.repository }}/blob/FULL_SHA/file.ext#L10-L15

            ---
            Generated with [Claude Code](https://claude.ai/code)
            ```

            If previous review findings were provided above, add a section:
            ```
            ### Previous Findings Status
            1. [RESOLVED] description — fixed in commit abc123
            2. [STILL OPEN] description — not addressed
            ```

            If zero issues survive the confidence filter, post:
            ```
            ### Code Review

            No issues found. Reviewed for bugs, security, performance, CLAUDE.md compliance, and code quality.

            Generated with [Claude Code](https://claude.ai/code)
            ```

            Use full git SHA in permalink URLs. Include at least 1 line of context before and after flagged lines.
          claude_args: '--allowedTools "Agent,Read,Glob,Grep,Bash(gh:*),Bash(git blame:*),Bash(git log:*),Bash(git diff:*),Bash(git show:*),Bash(cat:*),Bash(head:*),Bash(wc:*),Bash(find:*),Bash(ls:*)"'
          show_full_output: true
          additional_permissions: |
            actions: read
